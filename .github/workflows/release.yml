# .github/workflows/release.yml

name: Release with GoReleaser

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Smoke test release image
        run: |
          smoke_dir="${RUNNER_TEMP}/omada-exporter-smoke/linux/amd64"
          mkdir -p "${smoke_dir}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X github.com/RCooLeR/omada_exporter/cmd.version=${GITHUB_REF_NAME#v}" -o "${smoke_dir}/omada-exporter" .
          docker build --platform linux/amd64 -f Dockerfile.goreleaser -t omada-exporter-smoke:${GITHUB_REF_NAME#v} "${RUNNER_TEMP}/omada-exporter-smoke"
          docker run --rm omada-exporter-smoke:${GITHUB_REF_NAME#v} --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
